<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Support | WebHarvester</title>
  <meta name="description" content="Support page for WebHarvester." />
  <style>
    :root {
      --bg: #f4f8ff;
      --card: #ffffff;
      --ink: #15243a;
      --muted: #4a617f;
      --brand: #0a5fd2;
      --line: #d7e1ef;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Space Grotesk", "Avenir Next", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(700px 260px at -120px -80px, #cce7ff 0%, transparent 65%),
        radial-gradient(520px 220px at 120% 0%, #ffe2cd 0%, transparent 60%),
        var(--bg);
    }

    .wrap { width: min(860px, 92vw); margin: 54px auto; }

    .top {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 16px 34px rgba(12, 35, 74, 0.12);
    }

    h1 { margin: 0 0 12px; font-size: clamp(28px, 4vw, 44px); letter-spacing: -0.02em; }
    p { margin: 0 0 12px; color: var(--muted); font-size: 16px; }

    .meta {
      margin-top: 20px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
      display: grid;
      gap: 8px;
    }

    .row { font-size: 15px; color: var(--ink); }
    a { color: var(--brand); font-weight: 700; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .btn {
      display: inline-block;
      border-radius: 999px;
      padding: 10px 15px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-weight: 700;
    }

    .btn.primary {
      color: #fff;
      border-color: #0c58bd;
      background: linear-gradient(145deg, #0d79db, #0b56be);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <a class="btn primary" href="./index.html">Back to Home</a>
    </div>

    <section class="card">
      <h1>Support</h1>
      <p>If you need help with WebHarvester, contact the developer using the details below.</p>
      <p>For faster support, include your browser version, the target URL, and the status/error text shown in the side panel.</p>

      <div class="meta">
        <div class="row"><strong>Developer:</strong> Russel Sese</div>
        <div class="row"><strong>LinkedIn:</strong> <a href="https://www.linkedin.com/in/russelsese/" target="_blank" rel="noopener noreferrer">https://www.linkedin.com/in/russelsese/</a></div>
      </div>
    </section>
  </main>
</body>
</html>
